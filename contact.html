<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - JobSeek</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1.2em" width="1.2em" xmlns="http://www.w3.org/2000/svg"><path d="M432 160h-96V112c0-26.5-21.5-48-48-48h-64c-26.5 0-48 21.5-48 48v48H80c-26.5 0-48 21.5-48 48v224c0 26.5 21.5 48 48 48h352c26.5 0 48-21.5 48-48V208c0-26.5-21.5-48-48-48zM208 112h96v48h-96v-48z"></path></svg>
        JobSeek
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="internships.html">Internships</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
        <li><a href="post.html" class="nav-btn">Post a Job</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <div class="section-header" style="text-align: center; justify-content: center; margin-bottom: 3rem;">
      <h1 class="section-title">Get in Touch</h1>
      <p style="color: var(--text-muted); margin-top: 0.5rem;">Have questions? We'd love to hear from you.</p>
    </div>

    <div class="form-container fade-in">
      <div id="formAlert" class="alert">
        Message sent successfully! We will get back to you soon.
      </div>

      <form id="contactForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" class="form-control" placeholder="How can we help you?" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="font-size: 1.1rem; padding: 1rem;">Send Message</button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="nav-container">
      <p>&copy; 2024 JobSeek Platform. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
