<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobSeek | Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="home">
  <header class="site-header">
    <nav class="nav container">
      <a class="logo" href="index.html">JobSeek</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="internships.html">Internships</a></li>
        <li><a href="post.html">Post Job</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Find Your Dream Job or Internship</h1>
        <p>Discover great opportunities from top companies.</p>
        <form id="homeSearch" class="search-bar" action="jobs.html">
          <input type="text" name="q" placeholder="Search by title or keyword" />
          <button type="submit">Search</button>
        </form>
      </div>
    </section>

    <section class="container section">
      <h2>Featured Jobs</h2>
      <div id="featuredJobs" class="cards"></div>
    </section>

    <section class="container section">
      <h2>Featured Internships</h2>
      <div id="featuredInternships" class="cards"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 JobSeek. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
